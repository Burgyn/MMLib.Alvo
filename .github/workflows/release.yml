name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Pack & draft release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Pack
        run: dotnet pack --configuration Release --output artifacts

      # Skeleton (issue #14, pack-only for now): draft a GitHub release with
      # notes generated from the commits since the last tag, and attach the
      # packages. The NuGet / GitHub Packages publish step goes here for v0.1.
      - name: Draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/*.nupkg --draft --generate-notes
