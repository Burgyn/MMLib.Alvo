name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      # Nothing invokes the tool manifest in CI yet (dotnet-affected is wired
      # for ring2 once integration projects exist) — this only validates the
      # manifest stays restorable, so one OS is enough.
      - name: Restore tools (manifest check)
        if: runner.os == 'Linux'
        run: dotnet tool restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # After Build, so a compile error is always attributed to the Build step.
      # Formatting is OS-independent — run the verify gate once (Linux) to avoid
      # cross-platform line-ending flakiness. It catches formatting/style that
      # .editorconfig marks below warning (whitespace, using order, IDE naming).
      - name: Format gate
        if: runner.os == 'Linux'
        run: dotnet format --verify-no-changes

      # The PR is the single full gate: run the rings (ring2 = ring1 + affected
      # integration + API-invariant/Vacuum placeholders) on both OSes. Same
      # scripts the agent runs locally. bash is available on the Windows runner.
      - name: Test (rings)
        shell: bash
        env:
          ALVO_CONFIGURATION: Release
        run: scripts/test-ring2

      # Pack-only on the PR (issue #14): prove packaging works and publish the
      # .nupkg as an artifact. No feed publish — that lands with v0.1.
      - name: Pack
        if: runner.os == 'Linux'
        run: dotnet pack --configuration Release --no-build --output artifacts

      - name: Upload packages
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
          if-no-files-found: error

  # Stable required status check: the branch ruleset requires "Build & test",
  # which must not change when matrix legs are added/removed. This gate passes
  # only if every matrix leg succeeded.
  build-and-test:
    name: Build & test
    needs: build-test
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all matrix legs to pass
        run: |
          if [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "One or more Build & test matrix legs failed."
            exit 1
          fi
          echo "All Build & test matrix legs passed."

  brief-freshness:
    name: Brief freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Check design-brief is fresh vs its sources
        run: bash scripts/check-brief-freshness
