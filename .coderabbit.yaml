# CodeRabbit config for MMLib.Alvo — a solo-maintained, pre-v1, Apache-2.0
# .NET Backend-as-a-Service framework. Keep this lean; revisit once the repo
# has external contributors or security-critical modules (auth/RBAC/secrets)
# actually land. Full schema: https://docs.coderabbit.ai (some reference
# pages require an access code we don't have — sanity-check against the
# CodeRabbit dashboard UI if a key here turns out to be wrong; unknown keys
# are ignored, not fatal).

language: "en-US"

tone_instructions: >
  This is MMLib.Alvo, a solo-maintainer, pre-v1, Apache-2.0-licensed .NET
  Backend-as-a-Service framework (net10.0, Central Package Management).
  Be direct and concise, no filler praise. Specifically flag:
  (1) any PackageReference carrying an inline Version attribute — this repo
  uses Central Package Management, versions belong only in
  Directory.Packages.props;
  (2) use of MediatR or FluentAssertions v8+ — both are disallowed for
  licensing reasons, use Shouldly for assertions instead;
  (3) public API members (types/methods/properties) on shipped library
  projects missing XML doc comments (`/// <summary>`);
  (4) comments that narrate *what* the code does instead of *why* — this
  project's stated style is why-not-what, comments describing obvious
  behavior should be flagged for removal.
  There are no external contributors yet, so prioritize correctness and
  security over style nitpicks. This is a Backend-as-a-Service framework
  whose eventual scope includes authentication, RBAC, secrets management,
  multi-tenancy isolation, and script/rule execution (CEL, Roslyn scripting)
  — any code touching those areas deserves extra scrutiny for privilege
  escalation, cross-tenant data leaks, SSRF (webhooks), and injection risks.

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
  path_filters:
    - "!**/bin/**"
    - "!**/obj/**"
    - "!**/*.png"
    - "!**/*.svg"
    - "!docs/superpowers/**"
  path_instructions:
    - path: "**/*.cs"
      instructions: >
        Comments must explain *why*, not *what* — flag any comment that
        narrates obvious behavior. Public API members (public types,
        methods, properties) in ports/core library projects require XML
        doc comments (`/// <summary>`). Flag any use of MediatR or
        FluentAssertions v8+; this project uses Shouldly for assertions.
    - path: "**/*.csproj"
      instructions: >
        No PackageReference should carry an inline Version attribute —
        this repo uses Central Package Management (ManagePackageVersionsCentrally),
        all versions belong in Directory.Packages.props.
    - path: "**/*.Tests/**/*.cs"
      instructions: >
        Tests should rely on descriptive test names, not comment blocks,
        per project convention.

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    filePatterns:
      - "CLAUDE.md"
